<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scobru | Developer & Sound Designer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css"
        crossorigin="anonymous" />
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <style type="text/tailwindcss">
        @theme {
            /* M3E Color System */
            --color-primary: oklch(0.55 0.2 250);
            --color-on-primary: oklch(1 0 0);
            --color-primary-container: oklch(0.9 0.05 250);
            --color-on-primary-container: oklch(0.2 0.1 250);
            
            --color-surface: oklch(0.98 0.01 250);
            --color-surface-dim: oklch(0.88 0.01 250);
            --color-surface-container: oklch(0.94 0.01 250);
            --color-surface-container-high: oklch(0.92 0.01 250);
            --color-on-surface: oklch(0.2 0.02 250);
            --color-on-surface-variant: oklch(0.45 0.03 250);
            
            --color-outline: oklch(0.5 0.02 250);
            --color-outline-variant: oklch(0.8 0.01 250);

            /* Typography */
            --font-sans: 'Inter', sans-serif;
            --font-mono: 'IBM Plex Mono', monospace;

            /* Spacing & Radius */
            --radius-xs: 0.25rem;
            --radius-sm: 0.5rem;
            --radius-md: 0.75rem;
            --radius-lg: 1rem;
            --radius-xl: 1.5rem;
            --radius-full: 9999px;

            /* Shadows */
            --shadow-level-1: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-level-2: 0 1px 3px 0 rgb(0 0 0 / 0.1), 0 1px 2px -1px rgb(0 0 0 / 0.1);
            --shadow-level-3: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);

            /* Easing & Duration */
            --ease-standard: cubic-bezier(0.2, 0, 0, 1);
            --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
            
            --duration-short-4: 200ms;
            --duration-medium-2: 300ms;
        }

        /* Dark Theme Override */
        @media (prefers-color-scheme: dark) {
            :root, [data-theme="dark"] {
                --color-primary: oklch(0.7 0.15 250);
                --color-on-primary: oklch(0.2 0.1 250);
                --color-primary-container: oklch(0.3 0.1 250);
                --color-on-primary-container: oklch(0.9 0.05 250);
                
                --color-surface: oklch(0.18 0.01 250);
                --color-surface-dim: oklch(0.15 0.01 250);
                --color-surface-container: oklch(0.22 0.01 250);
                --color-surface-container-high: oklch(0.26 0.01 250);
                --color-on-surface: oklch(0.9 0.01 250);
                --color-on-surface-variant: oklch(0.7 0.02 250);
                
                --color-outline: oklch(0.5 0.02 250);
                --color-outline-variant: oklch(0.35 0.02 250);
                
                --shadow-level-1: 0 1px 2px 0 rgb(0 0 0 / 0.3);
                --shadow-level-2: 0 1px 3px 0 rgb(0 0 0 / 0.4), 0 1px 2px -1px rgb(0 0 0 / 0.3);
                --shadow-level-3: 0 4px 6px -1px rgb(0 0 0 / 0.5), 0 2px 4px -2px rgb(0 0 0 / 0.4);
            }
        }
        
        [data-theme="light"] {
            /* Forced Light Theme Support via JS */
            --color-primary: oklch(0.55 0.2 250);
            --color-on-primary: oklch(1 0 0);
            --color-primary-container: oklch(0.9 0.05 250);
            --color-on-primary-container: oklch(0.2 0.1 250);
            --color-surface: oklch(0.98 0.01 250);
            --color-surface-dim: oklch(0.88 0.01 250);
            --color-surface-container: oklch(0.94 0.01 250);
            --color-surface-container-high: oklch(0.92 0.01 250);
            --color-on-surface: oklch(0.2 0.02 250);
            --color-on-surface-variant: oklch(0.45 0.03 250);
            --color-outline: oklch(0.5 0.02 250);
            --color-outline-variant: oklch(0.8 0.01 250);
            --shadow-level-1: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-level-2: 0 1px 3px 0 rgb(0 0 0 / 0.1), 0 1px 2px -1px rgb(0 0 0 / 0.1);
            --shadow-level-3: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
        }

        body {
            background-color: var(--color-surface);
            color: var(--color-on-surface);
            transition: background-color 0.3s ease, color 0.3s ease;
            position: relative;
            z-index: 0;
        }

        /* Subtle Animated Background */
        body::before {
            content: "";
            position: fixed;
            top: -20%; left: -20%; width: 140%; height: 140%;
            z-index: -1;
            background: 
                radial-gradient(circle at 30% 70%, var(--color-primary-container) 0%, transparent 40%),
                radial-gradient(circle at 70% 30%, var(--color-outline-variant) 0%, transparent 40%);
            opacity: 0.3;
            animation: bg-pan 25s ease-in-out infinite alternate;
            pointer-events: none;
        }

        @keyframes bg-pan {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(3%, 4%) scale(1.05); }
            100% { transform: translate(-2%, -3%) scale(1); }
        }

        /* Base Card Pattern (M3E) */
        .m3-card {
            background-color: var(--color-surface-container);
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-level-1);
            transition: transform var(--duration-medium-2) var(--ease-spring),
                        box-shadow var(--duration-short-4) var(--ease-standard);
        }

        .m3-card-interactive:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-level-3);
            cursor: pointer;
        }

        .m3-card-interactive:active {
            transform: scale(0.98);
        }
        
        .m3-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: var(--radius-full);
            transition: all var(--duration-medium-2) var(--ease-spring);
        }
        
        .m3-btn:active {
            transform: scale(0.95);
        }
    </style>
</head>

<body
    class="font-sans antialiased min-h-screen p-4 sm:p-10 flex justify-center selection:bg-primary-container selection:text-on-primary-container">

    <div class="max-w-5xl w-full">
        <!-- Top Nav -->
        <div class="flex justify-end gap-4 mb-8">
            <button onclick="toggleTheme()"
                class="m3-btn bg-surface-container-high px-6 py-3 text-on-surface shadow-level-1 hover:shadow-level-2 hover:bg-surface-dim font-medium text-sm focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-primary">
                <i class="fas fa-adjust mr-2"></i> Theme
            </button>
        </div>

        <!-- Bento Grid -->
        <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-6" id="main-grid">
            <!-- Profile Card -->
            <div
                class="m3-card col-span-1 sm:col-span-2 md:col-span-4 p-8 sm:p-10 flex flex-col sm:flex-row items-center gap-8 group">
                <img src="https://pbs.twimg.com/profile_images/1486649866843529216/DSC3rQ3A_400x400.jpg" alt="Scobru"
                    class="w-36 h-36 rounded-full object-cover border-4 border-surface-container-high shadow-level-2 transition-transform duration-medium-2 ease-spring group-hover:scale-105 group-hover:border-primary/30" />
                <div class="text-center sm:text-left">
                    <h1 class="text-4xl font-bold tracking-tight mb-2 text-on-surface">Francesco Bruno (Scobru)</h1>
                    <p class="text-xl text-on-surface-variant mb-6">Open Source Developer, Sound Designer & Teacher</p>
                    <div class="flex flex-wrap justify-center sm:justify-start gap-3">
                        <span
                            class="font-mono text-xs font-semibold px-4 py-1.5 rounded-full border border-outline text-on-surface-variant">VERSION:
                            2.1.0</span>
                        <span
                            class="font-mono text-xs font-semibold px-4 py-1.5 rounded-full bg-primary-container text-on-primary-container">STATUS:
                            ONLINE</span>
                        <span
                            class="font-mono text-xs font-semibold px-4 py-1.5 rounded-full border border-outline text-on-surface-variant">CREATIVE</span>
                        <span
                            class="font-mono text-xs font-semibold px-4 py-1.5 rounded-full border border-outline text-on-surface-variant">TECH</span>
                    </div>
                </div>
            </div>

            <!-- Dynamic Sections will be injected here -->
        </div>

        <footer class="mt-20 mb-10 text-center flex items-center justify-center gap-3 text-on-surface-variant text-sm">
            <span class="relative flex h-3 w-3">
                <span
                    class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                <span class="relative inline-flex rounded-full h-3 w-3 bg-green-500"></span>
            </span>
            <span class="font-mono">SYSTEM OPERATIONAL // SCOBRU.DEV</span>
        </footer>
    </div>

    <script>
        function toggleTheme() {
            const body = document.body;
            if (body.getAttribute('data-theme') === 'light') {
                body.removeAttribute('data-theme');
            } else {
                body.setAttribute('data-theme', 'light');
            }
        }

        const sections = [
            {
                id: 'music-and-art',
                title: 'Music & Art',
                cols: 'col-span-1 sm:col-span-2 md:col-span-2',
                items: [
                    { title: 'HOMOLOGO', sub: 'Songwriter, Pop, Electronic', url: 'https://homologomusic.bandcamp.com', icon: 'fas fa-record-vinyl' },
                    { title: 'FADE', sub: 'Electronic', url: 'https://fademusik.bandcamp.com', icon: 'fas fa-wave-square' },
                    { title: 'ZIMA BLUE', sub: 'Ambient, Experimental', url: 'https://zimablue.bandcamp.com', icon: 'fas fa-water' },
                    { title: 'AUDIUS', sub: 'All my music on Audius', url: 'https://audius.co/francescobruno', icon: 'fas fa-headphones' }
                ]
            },
            {
                id: 'apps-and-services',
                title: 'Apps & Services',
                cols: 'col-span-1 sm:col-span-2 md:col-span-2',
                items: [
                    { title: 'ZEN KEEP', sub: 'End-to-end encrypted vault', url: 'apps/keep.html', icon: 'fas fa-key' },
                    { title: 'ZEN NOTES', sub: 'Decentralized thoughts & notes', url: 'apps/notes.html', icon: 'fas fa-pen-nib' },
                    { title: 'ZEN BOOKMARKS', sub: 'Decentralized bookmark manager', url: 'apps/bookmarks.html', icon: 'fas fa-bookmark' },
                    { title: 'TUNECAMP', sub: 'Decentralized Music Streaming', url: 'https://scobru-tunecamp.vercel.app/', icon: 'fas fa-music' },
                    { title: 'LINDA', sub: 'Encrypted P2P chat', url: 'https://scobru-linda.vercel.app/', icon: 'fas fa-comments' },
                    { title: 'WORMHOLE', sub: 'Secure file transfer', url: 'https://scobru-wormhole.vercel.app/', icon: 'fas fa-file-export' },
                ]
            },
            {
                id: 'dev-tools',
                title: 'Dev Tools & Open Source',
                cols: 'col-span-1 sm:col-span-2 md:col-span-4',
                items: [
                    { title: 'DELAY', sub: 'Network node server', url: 'https://github.com/scobru/shogun-relay', icon: 'fas fa-network-wired' },
                    { title: 'SMART CONTRACTS', sub: 'Solidity infrastructure', url: 'https://github.com/scobru/shogun-contracts', icon: 'fab fa-ethereum' }
                ]
            },
            {
                id: 'socials',
                title: 'Connect',
                cols: 'col-span-1 sm:col-span-2 md:col-span-4',
                items: [
                    { title: 'GITHUB', sub: 'scobru', url: 'https://github.com/scobru', icon: 'fab fa-github' },
                    { title: 'TWITTER', sub: 'scobru1988', url: 'https://twitter.com/scobru1988', icon: 'fab fa-twitter' },
                    { title: 'MASTODON', sub: '@scobru', url: 'https://livellosegreto.it/@scobru', icon: 'fab fa-mastodon' },
                    { title: 'TELEGRAM', sub: 't.me/scobru', url: 'https://t.me/scobru', icon: 'fab fa-telegram' },
                    { title: 'INSTAGRAM', sub: 'francescobruno', url: 'https://instagram.com/francescobruno', icon: 'fab fa-instagram' },
                    { title: 'YOUTUBE', sub: 'scobru88', url: 'https://youtube.com/scobru88', icon: 'fab fa-youtube' },
                    { title: 'EMAIL', sub: 'dev.scobru@pm.me', url: 'mailto:dev.scobru@pm.me', icon: 'fas fa-envelope' }
                ]
            }
        ];

        function renderGrid() {
            const gridContainer = document.getElementById('main-grid');

            sections.forEach(sec => {
                const wrapper = document.createElement('div');
                wrapper.className = sec.cols + ' mt-4';

                const title = document.createElement('h2');
                title.className = 'text-sm font-semibold tracking-widest uppercase text-on-surface-variant mb-6 flex items-center gap-3 after:content-[""] after:flex-1 after:h-px after:bg-outline-variant/30';
                title.innerHTML = `<span class="bg-primary-container text-on-primary-container p-2 rounded-lg inline-flex"><i class="fas fa-folder-open"></i></span> ${sec.title}`;
                wrapper.appendChild(title);

                const innerGrid = document.createElement('div');
                innerGrid.className = 'grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4';

                sec.items.forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'm3-card m3-card-interactive p-6 flex flex-col items-start group';
                    card.onclick = () => window.open(item.url, item.url.startsWith('http') ? '_blank' : '_self');

                    const icon = item.icon || 'fas fa-link';

                    card.innerHTML = `
                        <div class="text-3xl text-primary mb-4 transition-transform duration-medium-2 ease-spring group-hover:scale-110 group-active:scale-95"><i class="${icon}"></i></div>
                        <h3 class="text-lg font-semibold text-on-surface mb-1">${item.title}</h3>
                        <p class="text-sm text-on-surface-variant">${item.sub}</p>
                    `;
                    innerGrid.appendChild(card);
                });

                wrapper.appendChild(innerGrid);
                gridContainer.appendChild(wrapper);
            });
        }

        renderGrid();
    </script>
</body>

</html>
