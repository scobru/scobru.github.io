<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZEN Keep | Scobru</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css"
        crossorigin="anonymous" />
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <style type="text/tailwindcss">
        @theme {
            --color-primary: oklch(0.55 0.2 250);
            --color-on-primary: oklch(1 0 0);
            --color-primary-container: oklch(0.9 0.05 250);
            --color-on-primary-container: oklch(0.2 0.1 250);
            --color-surface: oklch(0.98 0.01 250);
            --color-surface-dim: oklch(0.88 0.01 250);
            --color-surface-container: oklch(0.94 0.01 250);
            --color-surface-container-high: oklch(0.92 0.01 250);
            --color-on-surface: oklch(0.2 0.02 250);
            --color-on-surface-variant: oklch(0.45 0.03 250);
            --color-outline: oklch(0.5 0.02 250);
            --color-outline-variant: oklch(0.8 0.01 250);
            --color-error: oklch(0.55 0.25 25);
            --color-error-container: oklch(0.9 0.1 25);
            --color-on-error: oklch(1 0 0);

            --font-sans: 'Inter', sans-serif;
            --font-mono: 'IBM Plex Mono', monospace;

            --radius-xs: 0.25rem;
            --radius-sm: 0.5rem;
            --radius-md: 0.75rem;
            --radius-lg: 1rem;
            --radius-xl: 1.5rem;
            --radius-full: 9999px;

            --shadow-level-1: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-level-2: 0 1px 3px 0 rgb(0 0 0 / 0.1), 0 1px 2px -1px rgb(0 0 0 / 0.1);
            --shadow-level-3: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);

            --ease-standard: cubic-bezier(0.2, 0, 0, 1);
            --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
            --duration-short-4: 200ms;
            --duration-medium-2: 300ms;
        }

        @media (prefers-color-scheme: dark) {
            :root, [data-theme="dark"] {
                --color-primary: oklch(0.7 0.15 250);
                --color-on-primary: oklch(0.2 0.1 250);
                --color-primary-container: oklch(0.3 0.1 250);
                --color-on-primary-container: oklch(0.9 0.05 250);
                --color-surface: oklch(0.18 0.01 250);
                --color-surface-dim: oklch(0.15 0.01 250);
                --color-surface-container: oklch(0.22 0.01 250);
                --color-surface-container-high: oklch(0.26 0.01 250);
                --color-on-surface: oklch(0.9 0.01 250);
                --color-on-surface-variant: oklch(0.7 0.02 250);
                --color-outline: oklch(0.5 0.02 250);
                --color-outline-variant: oklch(0.35 0.02 250);
                --color-error: oklch(0.65 0.2 25);
                --shadow-level-1: 0 1px 2px 0 rgb(0 0 0 / 0.3);
                --shadow-level-2: 0 1px 3px 0 rgb(0 0 0 / 0.4), 0 1px 2px -1px rgb(0 0 0 / 0.3);
                --shadow-level-3: 0 4px 6px -1px rgb(0 0 0 / 0.5), 0 2px 4px -2px rgb(0 0 0 / 0.4);
            }
        }

        body {
            background-color: var(--color-surface);
            color: var(--color-on-surface);
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .m3-card {
            background-color: var(--color-surface-container);
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-level-1);
            transition: transform var(--duration-medium-2) var(--ease-spring),
                        box-shadow var(--duration-short-4) var(--ease-standard);
        }

        .m3-card-interactive:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-level-3);
            cursor: pointer;
        }
        .m3-card-interactive:active { transform: scale(0.98); }
        
        .m3-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: var(--radius-full);
            transition: all var(--duration-medium-2) var(--ease-spring);
        }
        .m3-btn:active { transform: scale(0.95); }

        .m3-input {
            background-color: var(--color-surface-container-high);
            border-bottom: 2px solid var(--color-outline);
            border-radius: var(--radius-xs) var(--radius-xs) 0 0;
            color: var(--color-on-surface);
            transition: border-color var(--duration-short-4) var(--ease-standard);
        }
        .m3-input:focus {
            border-bottom-color: var(--color-error); /* Use error color as accent for keep since it's private */
            outline: none;
            background-color: var(--color-surface-container-high);
        }
    </style>
</head>

<body
    class="font-sans antialiased min-h-screen p-4 sm:p-10 flex justify-center selection:bg-error-container selection:text-on-error-container">
    <div class="max-w-5xl w-full">
        <!-- Top Nav -->
        <div class="flex justify-end gap-4 mb-8">
            <button onclick="toggleTheme()"
                class="m3-btn bg-surface-container-high px-6 py-3 text-on-surface shadow-level-1 hover:shadow-level-2 hover:bg-surface-dim font-medium text-sm">
                <i class="fas fa-adjust mr-2"></i> Theme
            </button>
            <button id="logout-btn" onclick="logout()"
                class="hidden m3-btn border border-outline px-6 py-3 text-on-surface-variant hover:bg-surface-dim font-medium text-sm">
                <i class="fas fa-lock mr-2"></i> Lock Vault
            </button>
            <button onclick="window.location.href='../index.html'"
                class="m3-btn border border-outline px-6 py-3 text-error hover:bg-error/10 font-medium text-sm">
                <i class="fas fa-arrow-left mr-2"></i> Back
            </button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
            <!-- Header Card -->
            <div class="m3-card col-span-1 md:col-span-4 p-8 flex flex-col sm:flex-row items-center gap-6">
                <div
                    class="w-20 h-20 rounded-2xl bg-error-container text-on-error-container flex items-center justify-center text-4xl shadow-level-1">
                    <i class="fas fa-user-secret"></i>
                </div>
                <div class="text-center sm:text-left flex-1">
                    <h1 class="text-3xl font-bold tracking-tight mb-2 text-on-surface">ZEN Keep</h1>
                    <p class="text-on-surface-variant mb-4">End-to-End Encrypted Private Vault</p>
                    <div class="flex flex-wrap justify-center sm:justify-start gap-2">
                        <span
                            class="font-mono text-xs font-semibold px-3 py-1 rounded-full border border-outline text-on-surface-variant">DOC:
                            KEEP.MD</span>
                        <span
                            class="font-mono text-xs font-semibold px-3 py-1 rounded-full border border-error text-error"><i
                                class="fas fa-lock"></i> E2EE_ACTIVE</span>
                    </div>
                </div>
            </div>

            <!-- Auth Section -->
            <div id="auth-section" class="m3-card col-span-1 md:col-span-4 p-8">
                <h3 class="text-xl font-semibold mb-2 flex items-center gap-2"><i class="fas fa-key text-error"></i>
                    Unlock Vault</h3>
                <p class="text-sm text-on-surface-variant mb-6">Enter credentials to decrypt your local data.</p>
                <div class="flex flex-col sm:flex-row gap-4">
                    <input type="text" id="user-input" placeholder="Username"
                        class="m3-input px-4 py-3 flex-1 focus:border-b-error">
                    <input type="password" id="pass-input" placeholder="Password"
                        class="m3-input px-4 py-3 flex-1 focus:border-b-error">
                    <button id="login-btn"
                        class="m3-btn bg-error text-on-error px-8 py-3 shadow-level-1 hover:shadow-level-2 hover:opacity-90 font-medium"><i
                            class="fas fa-unlock mr-2"></i> Decrypt</button>
                </div>
            </div>

            <!-- Lock Screen -->
            <div id="lock-screen"
                class="col-span-1 md:col-span-4 flex flex-col items-center justify-center p-16 text-center text-on-surface-variant bg-surface-container border border-dashed border-outline rounded-3xl mt-4">
                <i class="fas fa-shield-alt text-5xl text-error mb-4"></i>
                <h3 class="text-xl font-bold mb-2">VAULT IS LOCKED</h3>
                <p class="text-sm">Your data is encrypted. Authenticate to view.</p>
            </div>

            <div id="app-content" class="hidden col-span-1 md:col-span-4 contents">
                <!-- Add Note Section -->
                <div id="add-section" class="m3-card col-span-1 md:col-span-4 p-8">
                    <h3 class="text-xl font-semibold mb-6 flex items-center gap-2"><i
                            class="fas fa-plus-circle text-error"></i> Secure New Data</h3>
                    <div class="flex flex-col gap-4">
                        <div class="flex flex-col sm:flex-row gap-4">
                            <input type="text" id="note-title" placeholder="Secret Title"
                                class="m3-input px-4 py-3 flex-[2] focus:border-b-error">
                            <input type="text" id="note-cat" placeholder="Tag"
                                class="m3-input px-4 py-3 flex-1 focus:border-b-error">
                        </div>
                        <textarea id="note-body" placeholder="Your private encrypted note..."
                            class="m3-input px-4 py-3 min-h-[120px] resize-y focus:border-b-error"></textarea>
                        <div class="flex justify-end">
                            <button id="add-note-btn"
                                class="m3-btn bg-error text-on-error px-8 py-3 shadow-level-1 hover:shadow-level-2 font-medium"><i
                                    class="fas fa-save mr-2"></i> Safe Store</button>
                        </div>
                    </div>
                </div>

                <!-- Notes Wrapper -->
                <div id="notes-container" class="col-span-1 md:col-span-4 contents"></div>
            </div>
        </div>

        <footer class="mt-20 mb-10 text-center flex items-center justify-center gap-3 text-on-surface-variant text-sm">
            <span class="relative flex h-3 w-3"><span id="status-ping"
                    class="animate-ping absolute inline-flex h-full w-full rounded-full bg-red-400 opacity-75"></span><span
                    id="status-dot" class="relative inline-flex rounded-full h-3 w-3 bg-red-500"></span></span>
            <span class="font-mono">ZEN_ENTROPY_NETWORK // E2EE_ACTIVE</span>
        </footer>
    </div>

    <script>
        function toggleTheme() {
            const body = document.body;
            body.setAttribute('data-theme', body.getAttribute('data-theme') === 'light' ? 'dark' : 'light');
        }
    </script>

    <script type="module">
        import ZEN from 'https://unpkg.com/@akaoio/zen/zen.min.js';

        let zen;
        let pair;
        let isAuthenticated = false;

        const relays = ['wss://zen.akao.io/zen', 'wss://zen0.akao.io/zen', 'wss://zen1.akao.io/zen', 'wss://shogun-relay.scobrudot.dev/zen'];
        localStorage.removeItem('zenPeers');

        zen = new ZEN({
            peers: relays,
        });

        async function login() {
            const userInput = document.getElementById('user-input').value || sessionStorage.getItem('zen_user');
            const passInput = document.getElementById('pass-input').value || sessionStorage.getItem('zen_pass');
            if (!userInput || !passInput) return;

            try {
                const btn = document.getElementById('login-btn');
                btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> Unlocking...';

                pair = await ZEN.pair(null, { seed: userInput + passInput });
                isAuthenticated = true;

                sessionStorage.setItem('zen_user', userInput);
                sessionStorage.setItem('zen_pass', passInput);

                document.getElementById('auth-section').classList.add('hidden');
                document.getElementById('lock-screen').classList.add('hidden');
                document.getElementById('app-content').classList.remove('hidden');
                document.getElementById('logout-btn').classList.remove('hidden');

                document.getElementById('status-ping').className = 'animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75';
                document.getElementById('status-dot').className = 'relative inline-flex rounded-full h-3 w-3 bg-green-500';

                loadNotes();
            } catch (e) {
                console.error("Login Error:", e);
                alert("Decryption failed: " + e.message);
                document.getElementById('login-btn').innerHTML = '<i class="fas fa-unlock mr-2"></i> Decrypt';
            }
        }

        async function addNote() {
            if (!isAuthenticated) return;
            const title = document.getElementById('note-title').value;
            const body = document.getElementById('note-body').value;
            const cat = document.getElementById('note-cat').value || 'private';

            if (!title || !body) return;

            const encTitle = await ZEN.encrypt(title, pair);
            const encBody = await ZEN.encrypt(body, pair);
            const encCat = await ZEN.encrypt(cat, pair);

            const note = { title: encTitle, body: encBody, cat: encCat, timestamp: Date.now(), encrypted: true };
            const soul = 'vault-' + Date.now() + '-' + Math.random().toString(36).substring(7);

            zen.get('~' + pair.pub).get('vault').get(soul).put(note, (ack) => {
                if (ack && ack.err) alert("Storage failed: " + ack.err);
            }, { authenticator: pair });

            document.getElementById('note-title').value = '';
            document.getElementById('note-body').value = '';
            document.getElementById('note-cat').value = '';
        }

        function deleteNote(soul) {
            if (!isAuthenticated) return;
            if (!confirm("Permanently erase this note?")) return;

            zen.get('~' + pair.pub).get('vault').get(soul).put(null, (ack) => {
                if (ack && !ack.err) {
                    const el = document.getElementById('note-' + soul);
                    if (el) el.remove();
                }
            }, { authenticator: pair });
        }

        async function loadNotes() {
            const container = document.getElementById('notes-container');
            container.innerHTML = '';
            const categories = {};

            zen.get('~' + pair.pub).get('vault').map().on(async (note, id) => {
                if (!note) {
                    const el = document.getElementById('note-' + id);
                    if (el) el.remove();
                    return;
                }

                let title, body, cat;
                try {
                    title = await ZEN.decrypt(note.title, pair);
                    body = await ZEN.decrypt(note.body, pair);
                    cat = await ZEN.decrypt(note.cat, pair) || 'private';
                } catch (e) {
                    console.warn("Could not decrypt note:", id);
                    return;
                }

                if (!title || !body) return;

                if (!categories[cat]) {
                    const wrapper = document.createElement('div');
                    wrapper.className = 'col-span-1 md:col-span-4 mt-6';

                    const secHeader = document.createElement('h2');
                    secHeader.className = 'text-sm font-semibold tracking-widest uppercase text-on-surface-variant mb-6 flex items-center gap-3 after:content-[""] after:flex-1 after:h-px after:bg-outline-variant/30';
                    secHeader.innerHTML = `<span class="bg-error-container text-on-error-container p-2 rounded-lg inline-flex"><i class="fas fa-folder-open"></i></span> ${cat}`;
                    wrapper.appendChild(secHeader);

                    const catList = document.createElement('div');
                    catList.className = 'grid grid-cols-1 sm:grid-cols-2 gap-4';
                    catList.id = `cat-${cat}`;
                    wrapper.appendChild(catList);

                    container.appendChild(wrapper);
                    categories[cat] = catList;
                }

                if (document.getElementById('note-' + id)) {
                    const existingContent = document.querySelector(`#note-${id} .note-text`);
                    if (existingContent) existingContent.innerText = body;
                    return;
                }

                const card = document.createElement('div');
                card.className = 'm3-card p-6 flex flex-col items-start relative group';
                card.id = 'note-' + id;

                card.innerHTML = `
                    <div class="text-3xl text-error mb-4"><i class="fas fa-lock-open"></i></div>
                    <h3 class="text-lg font-semibold text-on-surface mb-2">${title}</h3>
                    <p class="text-sm text-on-surface-variant whitespace-pre-wrap break-words note-text">${body}</p>
                `;

                if (isAuthenticated) {
                    const delBtn = document.createElement('button');
                    delBtn.className = 'absolute top-4 right-4 text-outline hover:text-error transition-colors p-2 rounded-full hover:bg-error-container hover:text-on-error-container';
                    delBtn.innerHTML = '<i class="fas fa-trash"></i>';
                    delBtn.title = 'Erase Data';
                    delBtn.onclick = (e) => {
                        e.stopPropagation();
                        deleteNote(id);
                    };
                    card.appendChild(delBtn);
                }

                categories[cat].appendChild(card);
            });
        }

        function logout() {
            sessionStorage.removeItem('zen_user');
            sessionStorage.removeItem('zen_pass');
            window.location.reload();
        }

        window.login = login;
        window.logout = logout;
        window.addNote = addNote;

        document.getElementById('user-input').addEventListener('keydown', (e) => { if (e.key === 'Enter') document.getElementById('pass-input').focus(); });
        document.getElementById('pass-input').addEventListener('keydown', (e) => { if (e.key === 'Enter') login(); });
        document.getElementById('login-btn').addEventListener('click', login);
        document.getElementById('add-note-btn').addEventListener('click', addNote);

        const savedUser = sessionStorage.getItem('zen_user');
        const savedPass = sessionStorage.getItem('zen_pass');
        if (savedUser && savedPass) login();
    </script>
</body>

</html>
