<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZEN Bookmarks | Scobru</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css" crossorigin="anonymous" />
    
    <style>
        :root {
            /* Bookmarks Accent is Glowing Retro Orange */
            --bg: #0b0b0c;
            --fg: #f5f5f7;
            --fg-muted: #888899;
            --border: #222226;
            --border-glow: rgba(255, 171, 64, 0.1);
            --selection-bg: rgba(255, 171, 64, 0.2);
            --selection-fg: #ffab40;
            --accent: #ffab40;
        }

        :root[data-theme="light"] {
            --bg: #fdfdfc;
            --fg: #1a1a24;
            --fg-muted: #7a7a8a;
            --border: #e2e2d9;
            --border-glow: rgba(184, 98, 0, 0.1);
            --selection-bg: rgba(184, 98, 0, 0.15);
            --selection-fg: #b86200;
            --accent: #b86200;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'IBM Plex Mono', Courier, monospace;
            background-color: var(--bg);
            color: var(--fg);
            min-height: 100vh;
            padding: 3rem 1.5rem;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            position: relative;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        /* Subtle scanlines effect overlay */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(
                rgba(18, 16, 16, 0) 50%, 
                rgba(0, 0, 0, 0.05) 50%
            );
            background-size: 100% 4px;
            z-index: 9999;
            pointer-events: none;
        }

        .container {
            width: 100%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        /* Top Nav */
        .top-nav {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            margin-bottom: 12px;
        }

        /* Retro button styles */
        .retro-btn {
            background-color: rgba(0, 0, 0, 0.15);
            border: 1px solid var(--border);
            color: var(--fg-muted);
            padding: 8px 16px;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 13px;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            user-select: none;
            transition: all 0.2s ease;
        }

        .retro-btn:hover {
            color: var(--fg);
            border-color: var(--accent);
            box-shadow: 0 0 5px var(--border-glow);
        }

        .retro-btn span {
            color: var(--accent);
        }

        .retro-btn-accent {
            color: var(--accent);
            border-color: var(--accent);
        }

        /* Card block container */
        .retro-card {
            border: 1px solid var(--border);
            padding: 24px;
            background-color: rgba(0, 0, 0, 0.15);
            position: relative;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .retro-card::before {
            content: attr(data-label);
            position: absolute;
            top: -10px;
            left: 15px;
            background: var(--bg);
            padding: 0 5px;
            font-size: 9px;
            color: var(--fg-muted);
            border: 1px solid var(--border);
            text-transform: uppercase;
        }

        .retro-card-header {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .icon-box {
            font-size: 30px;
            color: var(--accent);
            width: 56px;
            height: 56px;
            border: 1px dashed var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .header-text h1 {
            font-size: 22px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: -0.5px;
            color: var(--accent);
        }

        .header-text p {
            font-size: 12px;
            color: var(--fg-muted);
        }

        .meta-badges {
            display: flex;
            gap: 10px;
            margin-top: 6px;
        }

        .badge {
            font-size: 10px;
            padding: 2px 8px;
            border: 1px solid var(--border);
            color: var(--fg-muted);
            text-transform: uppercase;
        }

        .badge-accent {
            color: var(--accent);
            border-color: var(--accent);
        }

        /* Form styling */
        .form-row {
            display: flex;
            gap: 16px;
        }

        @media (max-width: 640px) {
            .form-row {
                flex-direction: column;
            }
        }

        .retro-input {
            background-color: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border);
            color: var(--fg);
            padding: 10px 14px;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 13px;
            flex: 1;
            width: 100%;
        }

        .retro-input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 5px var(--border-glow);
        }

        textarea.retro-input {
            min-height: 100px;
            resize: vertical;
        }

        /* Items display */
        .category-wrapper {
            margin-top: 10px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .section-divider {
            font-size: 11px;
            text-transform: uppercase;
            color: var(--accent);
            letter-spacing: 1.5px;
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: 15px;
        }

        .section-divider::after {
            content: "";
            flex: 1;
            height: 1px;
            border-bottom: 1px dashed var(--border);
        }

        .items-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
        }

        @media (max-width: 768px) {
            .items-grid {
                grid-template-columns: 1fr 1fr;
            }
        }

        @media (max-width: 480px) {
            .items-grid {
                grid-template-columns: 1fr;
            }
        }

        /* Item card */
        .item-card {
            border: 1px solid var(--border);
            padding: 20px;
            background-color: rgba(0, 0, 0, 0.1);
            position: relative;
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            gap: 8px;
            cursor: pointer;
        }

        .item-card:hover {
            border-color: var(--accent);
            background-color: rgba(255, 255, 255, 0.02);
            box-shadow: 0 0 5px var(--border-glow);
            transform: translateY(-2px);
        }

        .item-card-icon {
            font-size: 24px;
            color: var(--accent);
            margin-bottom: 8px;
            transition: transform 0.2s ease;
        }

        .item-card:hover .item-card-icon {
            transform: scale(1.1);
        }

        .item-card h3 {
            font-size: 16px;
            font-weight: 500;
            color: var(--fg);
        }

        .item-card p {
            font-size: 11px;
            color: var(--fg-muted);
            line-height: 1.4;
            word-break: break-all;
        }

        .trash-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: none;
            border: none;
            color: var(--fg-muted);
            cursor: pointer;
            font-size: 14px;
            transition: color 0.2s ease;
            padding: 5px;
            z-index: 10;
        }

        .trash-btn:hover {
            color: #ff0055;
        }

        .hidden {
            display: none !important;
        }

        /* Selection */
        ::selection {
            background-color: var(--selection-bg);
            color: var(--selection-fg);
        }

        /* Footers */
        .retro-footer {
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px dashed var(--border);
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            color: var(--fg-muted);
            font-size: 12px;
        }
    </style>
</head>

<body>
    <div class="container">
        <!-- Top Nav Controls -->
        <nav class="top-nav">
            <a class="retro-btn" onclick="toggleTheme()">[<span>theme</span>]</a>
            <a class="retro-btn hidden" id="logout-btn" onclick="logout()">[<span>lock</span>]</a>
            <a class="retro-btn" href="../index.html">[back]</a>
        </nav>

        <!-- Header Card -->
        <header class="retro-card" data-label="SYSTEM_PROFILE">
            <div class="retro-card-header">
                <div class="icon-box">
                    <i class="fas fa-bookmark"></i>
                </div>
                <div class="header-text">
                    <h1>ZEN Bookmarks</h1>
                    <p>Decentralized Bookmark Manager</p>
                    <div class="meta-badges">
                        <span class="badge">DOC: BOOKMARKS.MD</span>
                        <span class="badge badge-accent">CRYPTO_SECURE</span>
                    </div>
                </div>
            </div>
        </header>

        <!-- Authentication Section -->
        <section class="retro-card" id="auth-section" data-label="AUTH.key">
            <div class="header-text">
                <h1 style="font-size: 16px;"><i class="fas fa-key" style="margin-right: 8px;"></i>Authentication Required</h1>
                <p>Log in using Master Credentials to write, edit, or delete bookmarks.</p>
            </div>
            <div class="form-row">
                <input type="text" id="user-input" placeholder="Username" class="retro-input">
                <input type="password" id="pass-input" placeholder="Password" class="retro-input">
                <a class="retro-btn retro-btn-accent" id="login-btn" onclick="login()">[ authenticate ]</a>
            </div>
        </section>

        <!-- Dynamic Main App Content -->
        <div id="app-content" style="display: flex; flex-direction: column; gap: 24px;">
            <!-- Secure bookmark creation (Only shown when logged in) -->
            <section class="retro-card hidden" id="add-section" data-label="BOOKMARK.commit">
                <div class="header-text">
                    <h1 style="font-size: 16px;"><i class="fas fa-plus-circle" style="margin-right: 8px;"></i>Add Bookmark</h1>
                </div>
                <div style="display: flex; flex-direction: column; gap: 14px;">
                    <div class="form-row">
                        <input type="text" id="bm-name" placeholder="Site Name" class="retro-input" style="flex: 2;">
                        <input type="text" id="bm-cat" placeholder="Category" class="retro-input">
                    </div>
                    <input type="text" id="bm-url" placeholder="URL (e.g. https://...)" class="retro-input">
                    <div style="display: flex; justify-content: flex-end;">
                        <a class="retro-btn retro-btn-accent" id="add-bm-btn" onclick="addBookmark()">[ save ]</a>
                    </div>
                </div>
            </section>

            <!-- Decrypted Records Area -->
            <div id="bookmarks-container" class="category-wrapper"></div>
        </div>

        <!-- Terminal Status Footer -->
        <footer class="retro-footer">
            <span style="position: relative; display: flex; h: 3; w: 3;">
                <span id="status-ping" style="width: 8px; height: 8px; border-radius: 50%; display: inline-block; background-color: #ffab40; box-shadow: 0 0 6px #ffab40;"></span>
            </span>
            <span class="font-mono">ZEN_ENTROPY_NETWORK // SCOBRU.DEV</span>
        </footer>
    </div>

    <!-- Storage and Theme configurations scripts -->
    <script>
        let currentTheme = localStorage.getItem('theme') || 'dark';
        
        function applyTheme() {
            if (currentTheme === 'light') {
                document.documentElement.setAttribute('data-theme', 'light');
            } else {
                document.documentElement.removeAttribute('data-theme');
            }
        }

        function toggleTheme() {
            currentTheme = currentTheme === 'dark' ? 'light' : 'dark';
            localStorage.setItem('theme', currentTheme);
            applyTheme();
        }

        document.addEventListener('DOMContentLoaded', applyTheme);
    </script>

    <script type="module">
        import ZEN from 'https://unpkg.com/@akaoio/zen/zen.min.js';

        const PUBLIC_VIEW_KEY = '0oQit1EicIMgYeM9rVRMjmgP9MoQjfK0XJLq6imoJ1CR0';

        let zen;
        let pair;
        let isAuthenticated = false;

        const relays = ["wss://sudorecords.scobrudot.dev/zen", "wss://shogun-relay.scobrudot.dev/zen", "wss://zen.akao.io:8420/zen", "wss://zen0.akao.io:8420/zen", "wss://zen1.akao.io:8420/zen"];
        localStorage.removeItem('zenPeers');
        
        zen = new ZEN({
            peers: relays,
        });

        loadBookmarks(PUBLIC_VIEW_KEY);

        async function login() {
            const userInput = document.getElementById('user-input').value || sessionStorage.getItem('zen_user');
            const passInput = document.getElementById('pass-input').value || sessionStorage.getItem('zen_pass');
            if (!userInput || !passInput) return;

            try {
                const btn = document.getElementById('login-btn');
                btn.innerHTML = '[ authenticating... ]';

                pair = await ZEN.pair(null, { seed: userInput + passInput });
                isAuthenticated = true;

                sessionStorage.setItem('zen_user', userInput);
                sessionStorage.setItem('zen_pass', passInput);

                document.getElementById('auth-section').classList.add('hidden');
                document.getElementById('add-section').classList.remove('hidden');
                document.getElementById('logout-btn').classList.remove('hidden');

                // Update system indicator color to glowing green when auth is active
                const ping = document.getElementById('status-ping');
                ping.style.backgroundColor = '#39ff14';
                ping.style.boxShadow = '0 0 6px #39ff14';

                loadBookmarks(pair.pub);
            } catch (e) {
                console.error("Login Error:", e);
                alert("Auth failed: " + e.message);
                document.getElementById('login-btn').innerText = "[ authenticate ]";
            }
        }

        async function addBookmark() {
            if (!isAuthenticated) return;
            const name = document.getElementById('bm-name').value;
            const url = document.getElementById('bm-url').value;
            const cat = document.getElementById('bm-cat').value || 'general';

            if (!name || !url) return;

            const bm = { name, url, cat, timestamp: Date.now() };
            const soul = 'bm-' + Date.now() + '-' + Math.random().toString(36).substring(7);

            zen.get('~' + pair.pub).get('bookmarks').get(soul).put(bm, (ack) => {
                if (ack && ack.err) alert("Save failed: " + ack.err);
            }, { authenticator: pair });

            document.getElementById('bm-name').value = '';
            document.getElementById('bm-url').value = '';
            document.getElementById('bm-cat').value = '';
        }

        function deleteBookmark(soul) {
            if (!isAuthenticated) return;
            if (!confirm("Remove bookmark?")) return;

            zen.get('~' + pair.pub).get('bookmarks').get(soul).put(null, (ack) => {
                if (!ack.err) {
                    const el = document.getElementById('bm-' + soul);
                    if (el) el.remove();
                }
            }, { authenticator: pair });
        }

        function loadBookmarks(pubKey) {
            if (!pubKey) return;
            const container = document.getElementById('bookmarks-container');
            container.innerHTML = '';
            const categories = {};

            zen.get('~' + pubKey).get('bookmarks').map().on((bm, id) => {
                if (!bm) {
                    const el = document.getElementById('bm-' + id);
                    if (el) el.remove();
                    return;
                }
                if (!bm.name || !bm.url) return;
                const cat = bm.cat || 'general';

                if (!categories[cat]) {
                    const wrapper = document.createElement('div');
                    wrapper.className = 'category-wrapper';

                    const title = document.createElement('div');
                    title.className = 'section-divider';
                    title.textContent = cat;
                    wrapper.appendChild(title);

                    const catList = document.createElement('div');
                    catList.className = 'items-grid';
                    catList.id = `cat-${cat}`;
                    wrapper.appendChild(catList);

                    container.appendChild(wrapper);
                    categories[cat] = catList;
                }

                if (document.getElementById('bm-' + id)) return;

                const card = document.createElement('div');
                card.className = 'item-card';
                card.id = 'bm-' + id;
                card.onclick = () => window.open(bm.url, '_blank');

                let icon = 'fas fa-link';
                if (bm.url.includes('github.com')) icon = 'fab fa-github';
                if (bm.url.includes('twitter.com') || bm.url.includes('x.com')) icon = 'fab fa-twitter';
                if (bm.url.includes('youtube.com')) icon = 'fab fa-youtube';

                card.innerHTML = `
                    <div class="item-card-icon"><i class="${icon}"></i></div>
                    <h3>${bm.name}</h3>
                    <p class="font-mono">${bm.url}</p>
                `;

                if (isAuthenticated) {
                    const delBtn = document.createElement('button');
                    delBtn.className = 'trash-btn';
                    delBtn.innerHTML = '<i class="fas fa-trash"></i>';
                    delBtn.title = 'Delete Bookmark';
                    delBtn.onclick = (e) => {
                        e.stopPropagation();
                        deleteBookmark(id);
                    };
                    card.appendChild(delBtn);
                }

                categories[cat].appendChild(card);
            });
        }

        function logout() {
            sessionStorage.removeItem('zen_user');
            sessionStorage.removeItem('zen_pass');
            window.location.reload();
        }

        window.login = login;
        window.logout = logout;
        window.addBookmark = addBookmark;

        document.getElementById('user-input').addEventListener('keydown', (e) => { if (e.key === 'Enter') document.getElementById('pass-input').focus(); });
        document.getElementById('pass-input').addEventListener('keydown', (e) => { if (e.key === 'Enter') login(); });
        document.getElementById('login-btn').addEventListener('click', login);
        document.getElementById('add-bm-btn').addEventListener('click', addBookmark);

        const savedUser = sessionStorage.getItem('zen_user');
        const savedPass = sessionStorage.getItem('zen_pass');
        if (savedUser && savedPass) login();
    </script>
</body>

</html>
